body:
  text: 首座成正集示初心做工夫警語做工夫最初要發箇破生死心堅硬看破世界身心悉是假緣無實主宰若不發明本具底大理則生死心不破生死心既不破無常殺鬼念念不停却如何排遣將此一念作箇敲門瓦子如坐在烈火𦦨中求出相似亂行一步不得停止一步不得別生一念不得望別人救不得當恁麼時只須不顧猛火不顧身命不望人救不生別念不肯暫止往前直奔奔得出是好手做工夫貴在起疑情何謂疑情如生不知何來不得不疑來處死不知何去不得不疑去處生死關竅不破則疑情頓發結在眉睫上放亦不下趂亦不去忽朝撲破疑團生死二字是甚麼閑家具噁古德云大疑大悟小疑小悟不疑不悟做工夫把箇死字貼在額頭上將血肉身心如死去一般祇有要究明底這一念子現前這一念子如倚天長劍若觸其鋒者了不可得若淘滯磨鈍則劒去久矣做工夫最怕躭著靜境使人困於枯寂不覺不知動境人厭靜境多不生厭良以行人一向處乎喧閙之場一與靜境相應如食飴食蜜如人倦久喜睡安得自知耶外道使身心斷滅化為頑石亦從靜境而入良以歲久月深枯之又枯寂之又寂墮於無知與木石何異吾人或處於靜境祇要發明衣線下一段大事不知在靜境始得於大事中求其靜相了不可得斯為得也做工夫要中正勁挺不近人情苟循情應對則工夫做不上不但做不上日久月深則隨流俗阿師無疑也做工夫人擡頭不見天低頭不見地看山不是山見水不是水行不知行坐不知坐千人萬人之中不見有一人通身內外只是一箇疑團可謂攪渾世界疑團不破誓不休心此為工夫緊要何謂攪渾世界無量劫來本具的大理沉沉寂寂未甞動著要在當人抖擻精神天旋地轉自有波翻浪湧一段受用做工夫不怕死不得活只怕活不得死果與疑情廝結在一處動境不待遣而自遣妄心不待淨而自淨六根門頭自然虗豁豁地點著即到呼著即應何愁不活耶工夫做得上如挑千斤担子放亦不下如覓要緊的失物相似若覔不著誓不休心其中但不可生執生著生計執成病著成魔計成外果得一心一意如覔失物相似則三種泮然沒交涉所謂生心動念即乖法體矣做工夫舉起話頭時要歷歷明明如猫捕鼠相似古所謂不斬黎奴誓不休不然則坐在鬼窟裡昏昏沉沉過了一生有何所益猫捕鼠睜開兩眼四脚撑撑只要拿鼠到口始得縱有鷄犬在傍亦不暇顧參禪者亦復如是只是憤然要明此理縱八境交錯於前亦不暇顧纔有別念非但鼠兼走却猫兒做工夫一日要見一日工夫若因因循循百劫千生未有了的日子博山當時插一枝香見香了便云工夫如前無有損益一日幾枝香耶一年若干許香耶又云光景易過時不待人大事未明何日是了由此痛惜更多加䇿勵做工夫不可在古人公案上卜度妄加解釋縱一一領略得過與自己沒交涉殊不知古人一語一言如大火聚近之不得觸之不得何況坐臥其中耶更於其間分大分小論上論下不喪身失命者幾希此事不與教乘合故久脩習大椉業者不知不識何況聲聞緣覺諸小椉耶三賢十聖豈不通教說此一事三乘膽戰十地魂驚等覺菩薩說法如雲如雨度不可思議眾生入無生法忍尚喚作所知愚與道全乖又何況其餘耶葢此事從凡夫地頓同佛體人所難信信者器不信非器諸行人欲入斯宗乘者悉從信而入信之一字有淺有深有邪有正不可不辯淺者凡入法門誰云不信但信法門非信自心深者諸大乘菩薩尚不具信如華嚴疏云見有能說法者有所聽法眾尚未入乎信門如云即心即佛誰云不信及乎問汝是佛耶則支梧排遣承當不下法華云盡思共度量不能測佛智何以有盡思度量之心盖信不具耳邪正者自心即佛名正信心外取法名邪信即佛要究明自心親履實踐到不疑之地始名正信如顢頇儱侗猜三枚相似但云心即佛實不識自心即名邪信古人摘桃便定去鋤地便定去作務時亦定豈是坐久遏捺令心不起然後為定耶若如此即名邪定非禪者正意六祖云那伽常在定無有不定時須徹見本體方與此定相應釋迦老子下兜率降皇宮入雪山覩明星開幻眾未出此定不然則被動境漂溺孰名為定動境中求起處不可得靜境中亦求起處不可得動靜既無起處將何為境耶會得此意總是一箇定體充塞彌亘無餘蘊也做工夫不得沾著世法佛法中尚沾著一點也不得何況世法耶若真正話頭現前履氷不見寒蹈火不見熱荊棘林中橫身直過不見有掛礙始可在世法中橫行直撞不然盡被境緣轉將去欲得工夫成一片驢年也未夢見在做工夫人不可尋文逐句記言記語不但無益與工夫作障礙真實工夫返成緣慮欲得心行處絕豈可得乎做工夫最怕比量將心凑泊與道轉遠做到彌勒下生去管取沒交涉若是疑情頓發的漢子畐塞虗空不知有虗空名字如坐在銀山鐵壁之中祗要得箇活路若不得箇活路如何得安穩去但恁麼做去時節到來自有箇倒斷近時有等邪師教學者不在工夫上又云古人未甞做工夫此語最毒迷悞後生入地獄如箭射大義禪師坐禪銘云切莫信道不須參古聖孜孜為指南雖然舊閣閑田地一度嬴來得也未若不須參究便云得理此是天生彌勒自然釋迦此輩名為可憐憫者盖自己不曾參究或見古人一問一答便領悟去遂將識情解將去便誑妄於人或得一場熱病呌苦連天生平解的用不著或到臨命終時如螃蠏入湯鍋手忙脚亂悔之何及黃蘗禪師云塵勞逈脫事非常緊把繩頭做一場不是一翻寒徹骨爭得梅花撲鼻香此語最親切若將此偈時時警策工夫自然做得上如百里程途行一步則少一步不行祗住在這裡縱說得鄉里事業了了明明終不到家當得甚麼邊事做工夫㝡要緊是箇切字切字最有力不切則懈怠為懈怠生則放逸縱意靡所不至若用心真切放逸懈怠何由得生當知切之一字不愁不到古人田地不愁生死心不破捨此切字別求佛法皆是痴狂外邊走豈可以做工夫同日而語也切之一字豈但離過當下超善惡無記三性一句話頭用心甚切則不思善用心甚切則不思惡用心甚切則不落無記話頭切無掉舉話頭切無昏沉話頭現前則不落無記切之一字是㝡親切句用心親切則無間隙故魔不能入用心親切不生計度有無等則不落外道做工夫人行不知行坐不知坐謂話頭現前疑情不破尚不知有身心何況行坐耶做工夫最怕思惟做詩做偈做文賦等詩偈成則名詩僧文賦工則稱文字僧與參禪沒交涉凡遇著逆順境緣動人念處便當覺破提起話頭不隨境緣轉始得或云不打緊這三箇字最是悞人學者不可不審做工夫人多怕落空話頭現前那得空去只此怕落空的便空不去何況話頭現前耶做工夫疑情不破如臨深淵如履薄氷毫𨤲失念則喪身失命為疑情不破則大理不明一口氣不來又是一生被中陰牽引未免隨業識去改頭換面不覺不知由此則疑上更添箇疑提起話頭不明決定要明不破決定要破譬如捉賊須是見贓始得做工夫不得將心待悟如人行路住在路上待到家終不到家只須行到家若將心待悟終不悟只須逼拶令悟若大悟時如蓮花忽開如大夢忽覺良以夢不待覺睡熟時自覺華不得開時節到自開悟不待悟因緣會合時自悟余云因緣會合時貴在話頭真切逼拶令悟非待悟耶又悟時如披雲見天而廓落無依天旋地轉又是一飜境界做工夫要緊要正要綿密要融豁何謂緊人命在呼吸大事未明一口氣不來前路茫茫未知何往不得不緊古德云如麻繩著水一步緊一步何謂正學人須具擇法眼三千七百祖師大有樣子若毫釐有差則入邪徑經云唯此一事實餘二則非真何謂綿密眉毛與虗空廝結針劄不入水洒不濕不容有毫𨤲間隙若有毫𨤲間隙則魔境乘隙而入古德云一時不在如同死人何謂融豁世界濶一丈則古鏡濶一丈古鏡濶一丈則火爐濶一丈決不拘執住在一處捉定死蛇頭亦不繫墜在兩頭漭漭蕩蕩古德云圓同太虗無欠無餘真到融豁處則內不見有身心外不見有世界始得箇入頭緊而不正則枉用工正而不緊則不能入既入須要綿密始得相應既相應須要融豁方為化境做工夫著不得一絲毫別念行住坐臥單單只提起本參話頭發起疑情憤然要討箇下落若有絲毫別念古所謂雜毒入心豈但傷身命此傷乎慧命學者不可不謹余云別念非但世間法除究心之外佛法中一切好事悉名別念又豈但佛法中事於心體上取之捨之執之化之悉別念矣做工夫人多云做不上即此做不上便做去如人不識路便好尋路不可云尋不著路便休耶如尋著路的貴在行直至到家乃可爾不得站在路上不行終無到家日子做工夫做到無可用心處萬仞懸崖處水窮山盡處羅紋結角處如老鼠入牛角自有倒斷也做工夫最怕的一箇伶俐心伶俐心為之藥忌犯著些毫雖真藥現前不能救耳若真是個參禪漢眼如盲耳如聾心念纔起時如撞著銀山鐵壁相似如此則工夫始得相應耳工夫做得真切將身心與器界煉得如鐵橛子相似只待渠𪹼得斷卒得折更要撮得聚始得做工夫不怕錯只怕不知非縱然行在錯處若肯一念知非便是成佛作祖底基本出生死底要路破魔網底利器也釋迦大師於外道法一一證過祇是不坐在窠臼裏將知非便捨四箇字從凡夫只到大聖地位此意豈但出世法在世法中有失念處只消箇知非便捨便做得一箇淨白底好人若抱定錯處為是不肯知非縱是活佛現前救他不得做工夫不可避喧向寂瞑目合眼坐在鬼窟裏作活計古所謂黑山下坐死水浸濟得甚麼邊事只須在境緣上做得去始是得力處一句話頭頓在眉睫上行裏坐裏著衣喫飯裏迎賓待客裏祇要明這一句話頭落處一朝洗面時摸著鼻孔原來太近便得箇省力做工夫㝡怕認識神為佛事或揚眉瞬目搖頭轉腦將謂有多少奇特若把識神當事做外道奴也不得做工夫正要心行處滅切不可將心湊泊思惟問答機緣等洞山云體妙失宗機昧終始便不堪共語也若大理徹時一一三昧從自心中流出思惟造作何啻霄壤也工夫不怕做不上做不上要做上便是工夫古德云無門解脫之門無意道人之意貴在體悉箇入處若做不上便打退皷縱百劫千生其柰爾何疑情發得起放不下便是上路將生死二字貼在額頭上如猛虎趕來若不直走到家必喪身失命猶可住脚耶做工夫祇在一則公案上用心不可一切公案上作解會縱能解得終是解非悟耶法華經云是法非思量分別之所能到圓覺云以思惟心測度如來圓覺境界如將螢火熱須彌山終不能得洞山云擬將心意學玄宗大似西行却向東大凡穿鑿公案者須皮下有血識慚愧始得做工夫提起話頭祇是知疑情打不破必竟無第二念決不可向經書上引證牽動識情識情一動則妄念紛馳欲得言語道斷心行處滅安可得乎道不可須臾離可離非道也工夫不可須臾間斷可間斷非工夫也真正參究人如火燒眉毛上又如救頭然何暇為他事動念耶古德云如一人與萬人敵覿面那容眨眼看此語做工夫最要不可不知做工夫自己打未徹祇可辦自己事不可教人如人未到京城便為他人說京城中事非但瞞人亦自瞞耳做工夫曉夕不敢自怠如慈明大師夜欲將睡用引錐刺之又云古人為道不食不𥨊余又何人耶古人𦘕一石灰圈道理不明脚步不出圈內今人縱意肆情遊蕩不覊謂之活潑大可笑耳工夫或得輕安或有省發不可便為悟也博山當時看船子和尚沒踪跡句一日因閱傳燈見趙州囑僧云三千里外逢人始得不覺打失布袋如放下千斤担子自謂大悟逮見寶方如方木逗圓孔始具慚愧若悟後不見大善知識縱得安逸終是未了寶方勉余偈云空拶空兮功莫大有追有也德猶微謗他迦葉安生理得便宜處失便宜此是百尺竿頭進步句衲僧輩不可不審余甞謂學者云我得寶方不肯兩箇字受用不盡做工夫不得作道理會但硬硬參去始發得起疑情若作道理會祇是乾𪹼𪹼底豈但打不徹自己事連疑情亦發不起如人云器中盛底是何物實不是彼所指底物彼以非為是便不能發疑又不但不起疑即以彼物為此物以此物為彼物如此謬解若不開器親見一回則終其身而不可辨也做工夫不可作無事會但憤然要明此理若作無事會一生祇是箇無事人衣線下一件大事終是不了如人覓失物相似若覓著始了若覓不著便置在無事甲裏無有覓意縱然失物現前亦當面錯過盖無覔物意耳做工夫不可作擊石火電光會若光影門頭瞥有瞥無濟得甚事要得親履實踐親見一回始得若真真得意如青天白日之下見親生父母相似世間之樂事更無過者做工夫不得向意根下卜度思惟卜度使工夫不得成片不能發得起疑情思惟卜度四箇字障正信障正行兼障道眼學者於彼如生冤家相似乃可耳做工夫不得向舉起處承當若承當正所謂瞞頇儱侗與參究便不相應只須發起疑情打教徹無承當處亦無承當者如空中樓閣七通八達不然認賊為子認奴作郎古德云莫將驢鞍橋喚作阿爺下頷斯之謂也做工夫不得求人說破若說破終是別人底與自己沒相干如人問路到長安但可指路不可更問長安事彼一一說明長安事終是彼見底非問路者親見耶若不力行便求人說破亦復如是做工夫不祇是念公案念來念去有甚麼交涉念到彌勒下生時亦沒交涉何不念阿彌陀佛更有利益不但教不必念不妨一一舉起話頭如看無字便就無上起疑情如看栢樹子便就栢樹子起疑情如看一歸何處便就一歸何處起疑情疑情發得起盡十方世界是一個疑團不知有父母底身心通身是箇疑團不知有十方世界非內非外滾成一團只待彼如桶篐自𪹼再見善知識不待開口則大事了畢始撫掌大笑回觀念公案大似鸚鵡學語亦何預哉做工夫不可須臾失正念若失了參究一念必流入異端忘忘不返如人淨坐只喜澄澄湛湛純清絕點為佛事此喚作失正念墮在澄湛中或認定一個能講能譚能動能靜為佛事此喚作失正念認識神或將妄心遏捺令妄心不起為佛事此喚作失正念將妄心捺妄心如石壓草又如剝芭蕉葉剝一重又一重終無了底日子或觀想身心如虗空不起念如墻壁此喚作失正念玄沙云便擬凝心斂念攝事歸空即是落空亡外道魂不散底死人總而言之皆失正念故做工夫疑情發得起更要撲得破若撲不破時當確實正念發大勇猛切中更加箇切字始得徑山云大丈夫漢決欲究竟此一段大事因緣一等打破面皮性燥竪起脊梁骨莫順人情把自平昔所疑處貼在額頭上常時一似欠人萬百貫錢被人追索無物可償生怕被人耻辱無急得急無忙得忙無大得大底一件事方有趣向分評古德垂示警語趙州云三十年不雜用心除著衣喫飯是雜用心評非不用心不雜用心耳所謂置之一處無事不辦趙州云汝但究理坐看三二十年若不會截取老僧頭去評趙州著甚死急然雖如是歲月長討箇三二十年不異心者也難得趙州云老僧十八歲便解破家蕩產又云我當時被十二時辰使如今使得十二時評在家產上作活計被十二時辰使破得家產者便使得十二時忽有僧問如何是家產博山答云卸却皮囊即向汝道趙州云你若一生不離叢林不語五年十年無人喚你作啞漢已後佛也不柰你何評不語即是不雜用心若不向衣線下究理則太遠在天台韶國師云假饒答話揀辨如懸河祇成得箇顛倒知見若祗貴答話揀辨有甚麼難但恐無益於人翻成賺悞評今時人學得一肚皮尋常問來答去將佛法為戲具非但無益多成罪過而今恣閑言閑語以當宗乘看古人說話面皮厚多少國師云諸上座從前所學揀辨問答記持說道理極多為甚麼疑心不息聞古人方便特地不會祇為多虗少實評揀辨記持皆屬緣慮生死根不斷如何會得古人意所以云微言滯於心首返為緣慮之場實際居於目前翻為名相之境國師云上座不知從脚跟下一時破看是甚麼道理有多少法門與上座作疑求解始知從前所學底事祇是生死根源陰界裏活計所以古人道見聞不脫如水裏月評見聞緣慮誰人不有要有大轉變始得若不與工夫相應從水晶宮裡穿下過來終沒交涉古德云知解入心如油入麵永無出期不可不謹紹巖禪師云諸仁者今日國主致請祇圖諸仁者明心此外別無道理諸仁者還明心也未莫不是語言譚笑時凝然杜默時參尋知識時道伴商略時觀山翫水時耳目絕對時是汝心否如上所解盡為魔魅所著豈曰明心評語不是默不是見聞不是離見聞亦不是作麼生會即今禪者莫亂統好巖云更有一類人離身中妄想外別認徧十方世界含日月包太虗謂是本來真心斯亦外道所計非明心也評此喚作偏空外道又安得身心一如身外無餘耶即今禪和子不曾遇人自作主宰多落斯見又諸仁者要會麼心無是者亦無不是者汝擬執認其可得乎評前二種是病過在執認二字上此段是藥但無是非執認病即愈矣瑞鹿禪師云大凡參學未必學問話是參學未必學揀話是參學未必學代語是參學未必學別語是參學未必學捻破經論中奇特言語是參學未必捻破祖師奇特言語是參學若於如是等參學任你七通八達於佛法中倘無見處喚作乾慧之徒豈不聞聦明不敵生死乾慧豈免苦輪評今時人類皆如是正所謂拋却真金拾瓦礫不肯真實參究恣口頭三昧如香巖問一答十問十答百豈不是通達於佛法中無有見處父母未生前一句子便不柰何今時學語之流且道濟得甚麼邊事瑞鹿禪師云若也參學應須真實參學始得行時行時參取立時立時參取坐時坐時參取眠時眠時參取語時語時參取默時默時參取一切作務時一切作務時參取既向如是等時參且道參箇甚麼人參箇甚麼語到這裏須自有箇明白處始得若不如是喚作造次之流則無究竟之旨評要切究此參底語是甚麼語參底人是甚麼人若不究此語不識此參底人是謂空過非參學也芭蕉云如人行次忽遇前面萬丈深坑背後野火來逼兩畔是荊棘林若也向前則墮在坑壍若也退後則野火燒身轉側則被荊棘林礙當與恁麼時作麼生免得若也免得有出身之路若免不得墮身死漢評直須不顧危亡始得箇徹頭稍生疑議則喪身失命芭蕉此語最為工夫緊要學者多求知解墮在玄奧窠臼裏不向這裏留意是謂空過一生
