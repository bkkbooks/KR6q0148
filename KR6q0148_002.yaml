body:
  text: 首座成正集雲門云有一般掠虗漢食人涎唾記得一堆一擔骨董到處馳騁驢唇馬嘴誇我解問十轉五轉饒你從朝問到夜論劫恁麼還曾夢見麼評雲門當時正罵十者一二人而已今時紛紛皆是何曾向衲衣下體究設或坐片晌之時不是昏沉便是散亂蓋為一肚子落索吐不去割不斷若是個伶俐的漢才聞恁麼舉具大慚愧始得雲門示衆云諸兄弟切莫容易過時大須仔細古人大有葛藤相為處祇如雪峰道盡大地是汝自己夾山道百草頭上薦取老僧閙市裏識取天子洛浦云一塵才起大地全收一毛頭獅子全身總是汝把取翻覆思量看日久歲深自然有箇入處評此三段語牽你入門要你肯入不然盡在鬼窟裡作活計你若入得門自然怗怗底不見有山河大地不見有自己薦與不薦是兩頭語雲門云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可仔細點檢將來有甚麼氣息亦是病評此病全在境量上作活計不曾坐斷不曾透脫不曾得轉身吐氣這裏若別生異念則成魔作怪有分在玄沙云夫學般若菩薩須具大根器有大智慧始得若有智慧即今便出脫得去評大根器者一聞千悟得大總持説箇出脫字早是方便之辭也何以故從來不曾繫縛故玄沙云若是根機遲鈍直須勤苦日夜忘疲無眠失食如喪考妣相似恁麼急切盡一生去更得人荷挾尅骨究實不妨易得搆去且況如今誰是堪任學底人評盡大地人都堪任惟除無知不具信根者縱是釋迦佛放光動地其奈爾何玄沙云仁者莫祗是記言記語恰似念陀羅尼相似踏步向前來口裏哆哆啝啝被人把住詰問著沒去處便嗔道和尚不為我答話恁麼學事大苦知麼評記言語者謂之雜毒入心礙正知見世間讀書人記文字多便不能融化何況究出世法肯食他人涎唾耶玄沙云有一般坐繩牀和尚稱善知識問著搖身動手點眼吐舌瞪視評此等之流通身是魔通身是病到臘月三十日未免閙去在玄沙云更有一般説昭昭靈靈靈臺智性能見能聞向五蘊身田裏作主宰恁麼為善知識大賺人知麼我今問汝汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭時汝還會麼這箇喚作認賊為子是生死根妄想緣氣評此是弄精魂漢瞌睡時既做不得主生死到來作麼生折合一生胡亂做去豈但哄人皆自哄耳玄沙云汝今欲得出他五蘊身田主宰但識取汝祕密金剛體古人向汝道圓成正遍遍周沙界評祕密金剛體即圓成正遍遍周沙界分明向汝道須是全身拶入始得玄沙云佛道間曠無有程途無門解脫之門無意道人之意不在三際故不可升沉建立乖真非屬造化評若會得此意不費纖毫功行立地成佛還多了箇成字玄沙云動則起生死之本靜則醉昏沉之鄉動靜雙泯即落空亡動靜雙收顢頇佛性評行人多厭動取靜靜久復思動須剔起眉毛打破動靜窠臼始是道人用心也玄沙云必須對塵對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝鳥飛空中不雜空色評如枯木寒灰蓋無心不失其宜蓋應物豈與灰心泯智者同日而語哉其不亂光輝不雜空色云云自彼於我何為玄沙云所以十方無影像三界絶行蹤不墮往來機不住中間意箇中纖毫道不盡即為魔王眷屬句前句後是學人難處所以一句當天八萬門永絶生死評此語貴在一句當天八萬門盡十方世界無纖毫空缺處無纖毫影像無纖毫行迹可謂光爍爍活潑潑佛祖衆生沒處安著生死二字是阿誰恁麼道玄沙云直饒如秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事評坐禪人萬一不到恁麼田地到得尚是生死岸頭事須是自尋箇活路始得玄沙云道人行處如火銷氷終不却成氷箭既離弦無返回勢所以牢籠不肯住呼喚不回頭古聖不安排至今無處所評道人之心合當如是但將此段細抹將來自然省力沾連些兒不得若將識心湊泊正所謂因地不真果招迂曲玄沙云今時人不悟箇中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實評處處染著頭頭繫絆只是究心不切命根不斷不肯死去真正參學人如過蠱毒之鄉水也不可沾著一滴始得箇徹頭玄沙云便擬凝心斂念攝事歸空閉目藏睛才有念起旋旋破除細想才生即便遏捺如此見解即是落空亡外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑評病在不起疑情不究公案不肯全身入理只是將識心遏捺縱是澄澄湛湛畢竟命根不斷終不是做工夫人玄沙云仁者莫祇長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空去饒汝到精明湛不搖處不出識陰古人喚作如急流水流急不覺妄為恬靜評識心不斷縱鍊得身心如虗空終被惡業牽引去精明湛不搖處正是識陰如何免得生死總而言之不究徹大理悉是虗妄玄沙云恁麼修行盡出他輪回不得依前被輪回去所以道諸行無常直是三乘功果如是可畏若無道眼亦不究竟評總收上數段法語皆非究竟三乘行人縱行六度萬行皆生滅法於實際理地且喜沒交涉徑山云今時有一種外道自眼不明只管教人死獦狚地休去歇去若如此休歇到千佛出世也休歇不得轉使心頭迷悶耳評不肯起疑情則命根不斷命根既不斷休亦不去歇亦不得即此休歇二字便是生死根本縱百劫千生終無了底日子徑山云又一等人教人隨緣管帶忘情默照照來照去帶來帶去轉加迷悶無有了期評既有能帶之心所照之境能所對立非妄而何若以妄心為參究便於自心不得自在只須坐斷兩頭能所不立則礙膺之物如桶底脫矣徑山云又一等人教人是事莫管但只恁麼歇去歇得來情念不生到恁麼時不是冥然無知直是惺惺歷歷這般底更是毒害瞎却人眼不是小事評只饒到惺惺歷歷此是對寂之法非參究耶若參究直欲發明大事既不如是豈非毒害者哉徑山云不問久參先達若要真箇靜須是生死心破不著做工夫生死心破則自靜也評疑情發得起則生死心凝結在一處疑情破則生死心破於此破處求其動相了不可得示疑情發不起警語做工夫疑情發不起便欲尋行數墨檢討文字廣求知解將佛祖言教一串穿過都作一箇印子印定才舉起一則公案便作道理會去於本參話頭上不能發起疑情逢人難問著則不喜此是生滅心非禪也或隨聲應答竪指擎拳引筆疾書偈頌開示使人參究亦有意味自謂得大悟門殊不知疑情發不起皆是識心使然若肯一念知非全身放下見善知識求箇入路則可不然生滅心勝久之則成魔著殆不可救做工夫疑情發不起於境緣上生厭離喜到寂靜無人處坐去便覺得力便覺有意思才遇著些動處心即不喜此是生滅心非禪也坐久則與靜境相應冥然無知絶對絶待縱得禪定凝心不動與諸小乘何所異也稍遇境緣則不自在聞聲見色則生怕怖由怕怖故魔得其便由魔力故行諸不善一生修行都無所益皆是最初不善用心不善起疑情不肯見人不肯信人於靜謐處強作主宰縱遇善知識不肯一念知非千佛出世其奈爾何做工夫疑情發不起將情識妄想心遏捺令妄心不起到無起處則澄澄湛湛純清絶點此識心根源終不能破於澄湛絶點處都作箇工夫理會才遇人點著痛處如水上捺葫蘆相似此是生滅心非禪也蓋為最初不肯參話頭起疑情縱遏捺得身心不起如石壓草若死得識心成斷滅去正是落空亡外道若斷滅不去逢境緣時即引起識心於澄湛絶點處便作聖解自謂得大悟門縱則成狂著則成魔於世法中誑妄無知便起深孽退人信心障菩提道做工夫疑情發不起將身心器界悉皆空去空到無管帶處無依倚處不見有身心不見有世界非內非外總是一空謂空便是禪謂空得去便是佛行也是空坐也是空空來空去行住坐臥如在虗空中行此是生滅心非禪也不著則成頑空冥然無知著則成魔自謂大有悟門殊不知與參禪沒交涉若真是箇參禪漢發起疑情一句話頭如倚天長劍觸其鋒者即喪身失命若不如是只饒空得一念不起時只喚作箇空無所知非究竟耶做工夫疑情發不起遂將識心揣摩把古人公案胡亂穿鑿去謂是全提謂是半提謂是向上謂是向下是君是臣是兼帶語是平實語自謂見解人所不及縱一一説得道理與古人一口吐氣此是生滅心非禪也殊不知古人一語一言如嚼綿絮團使人吞不下吐不出豈肯與人生出幾多解路引起人識心耶若疑情發得起全身拶入去此解路識心不待你死去自然怗怗地做工夫疑情發不起將身心看破純是假緣其中自有一物往來能動能靜無形無相於六根門頭放光動地散則遍周沙界收則不立纖塵向這裏一認認定不肯起疑情不肯參究便謂了事人此是生滅心非禪也殊不知生死心不破將此等為快意正是弄識神一朝眼光落地便作不得主隨識神牽引去隨業受報去若善業多則生在人間天上到四相五衰逼將來便謂佛法無靈驗由此謗法墮在地獄餓鬼道中出得頭來知是幾多劫數以此觀之參禪全要見人若自作主宰總用不著做工夫疑情發不起便認定箇眼能見耳能聞舌能談鼻能嗅手能執著腳能運奔是自己一靈真性向這裡度量謂是悟門逢人則瞪眼側耳手指腳踢以為佛法此是生滅心非禪也古人喚作如發癎病相似又云在曲盝牀上弄鬼眼睛相似弄來弄去弄到四大分散時則弄不去更有一等惡見以此為奇特代相傳受人供養無慚無愧逢人問法則大喝一聲大笑一場殊不知從來未曾參究命根未斷縱行善事都是魔業非究竟耶做工夫疑情發不起便欲做有為功行或做解脫或行苦行冬不爐夏不扇人來乞衣便全身脫去甘心凍死謂之解脫人來乞食便自己不食甘心餓死謂之解脫更有種種不可具説總而論之皆是勝心所使誑惑無知彼無知者謂是活佛謂是菩薩盡其形命承事供養殊不知佛戒中謂之惡律儀業雖是持戒步步結罪又有一等燒身燃臂禮佛求懺謂之功課於世法中亦是好事參究分中當得甚麼事古德云切莫向他機境上求謂禮佛是機境求懺是機境佛法中一切好事悉機境也不是教你不行此一切善事但用心一處此一切善事悉能助發滋培善根他日道眼忽開燒香掃地皆佛事耳做工夫疑情發不起便欲散誕去便欲活潑去逢人則自歌自舞自歡自樂或水邊林下吟咏笑談或市井街坊橫行直撞自謂是箇了事人見善知識開叢林立規矩或坐禪或念佛或行一切善事則撫掌大笑生輕慢心謗瀆心自不能行道障人行道自不能𮘗經禮懺障人諷經禮懺自不能參禪障人參禪自不能開叢林障人開叢林自不能説法障人説法凡有善知識出世設幾個難問向人天衆前多答一句多問一句喝一聲打一掌善知識見彼做鬼戲相似或不理會他便向人道某善知識不會這箇道理苦哉苦哉此是生滅心勝久之則攝入魔道造無窮深孽受魔福盡墮無間獄雖是善因而招惡果悲夫做工夫疑情發不起覺得同衆人動止不便太拘束太煩紊便欲向深山無人處住靜去或向一間房屋裏住靜去初則硬作主宰閉目凝心跏趺合掌硬硬做去或一年二年一月兩月不見下落又有一等坐得三兩日便坐不住或看書或散誕或做偈做詩或關門打睡外現威儀內成流俗更有一等惡少年不識廉恥不信因果潛行貪欲逢人則恣口肆意誑妄無知自言我曾見善知識來我得上人法使無知者信受與彼通好或結為道友或招為徒弟上行下效自不知非不肯返省不肯見人妄自尊大大妄語成此輩名為可憐憫者今時厭大衆求私室寧不寒心者哉若真正學道人慎勿萠此念正好向衆人中參究彼此警覺縱不悟道決不陷到這般田地學者不可不警也示疑情發得起警語做工夫疑情發得起與法身理相應見盡大地光皎皎地無絲毫障礙便欲承當箇事不肯撒手坐在法身量邊由此命根不斷於法身中似有見地似有受用殊不知全是子想古人喚作隔身句既命根不斷通身是病非禪也到這裏只須全身拶入承當箇大事亦不知有承當者古德云懸崖撒手自肯承當絶後再蘇欺君不得若命根不斷全是生滅心若命根斷去不知轉身吐氣喚作墮身死漢非究竟耶這些子道理不難會自是行者不肯見人若遇著善知識磕著痛處當下知歸其或未然則伏尸萬里也做工夫疑情發得起與法身理相應攪渾世界得波翻浪湧一段受用行人耽著此受用推不向前約不退後由此不得全身拶入如貧人遇著座黃金山相似了了明明知得是金不能隨手得用古人喚作守寶漢通身是病非禪也到這裡只須不顧危亡始得與法相應天童所謂普周法界渾成飯鼻孔纍垂信飽參若不得鼻孔纍垂如坐在飯籮邊餓殺大海裡渴殺濟得甚麼邊事所以道悟後只須見人如古德悟後見善知識大有樣子若自承當箇事不肯遇人抽釘拔楔皆喚作自欺底漢耳做工夫疑情發得起與法身理相應看山不是山見水不是水盡大地畐塞塞地無纖毫空缺處忽生一箇度量心似障了面前障了身心提亦不起撲亦不破提起似有放下似無開口吐氣不得移身換步不得正恁麼時亦不得到這裡通身是病非禪也殊不知古人用心純一疑情發得起看山不是山見水不是水不生度量心不起別念硬硬逼拶去忽朝打破疑團通身是眼看山依舊山見水依舊水山河大地從甚麼處得來求纖毫悟迹了不可得到恁麼田地只須見人若不見人枯木巖前岐路中更有岐路到此不蹉跎不被枯木樁絆倒者博山與他結箇同參做工夫疑情發得起與法身理相應便沉沉寂寂去休去歇去一念萬年去將疑情鈍置法身理中不得受用一向死去無回互無管帶沒氣息全被死水裏浸殺自謂之極則通身是病非禪也石霜會下如此用工者極多縱坐脫立亡不得受用若受得鉗錘知得痛癢轉得身吐得氣便是人若不知痛癢雖會得法身句只饒坐斷十方有甚用處天童所謂坐斷十方猶點額密移一步看飛龍古人大有警語為人處大有葛藤相委悉自是人不肯打徹欲學善知識在人叢馬踏之中千自由百自在得不難乎做工夫疑情發得起與法身理相應坐到湛不搖處淨裸裸赤灑灑沒可把便放身去不識得轉位就機向這裏強立主宰滯在法身邊通身是病非禪也洞山云峯巒挺異鶴不停機靈木迢然鳳無依倚當知峰巒靈木四箇字太煞玄奧不是乾𪹼𪹼地不停無依四箇字太煞活潑不是死獦狚地若不究到玄奧處則不知入理之深若不到活潑處則不識旋機之妙道人用心用到無可用處正好見人打翻漆桶得箇徹處豈可抱愚守株滯在一隅甘心做籠中之鶴退毛之鳳哉做工夫疑情發得起與法身理相應面前隱隱地似有箇物相似將此隱隱地疑來疑去樁定箇前境便自謂入得法身理見得法界性不知此等揑目所成通身是病非禪也若真箇入理之人世界𤄃一丈古鏡𤄃一丈橫身當宇宙求其根塵器界了不可得又將何為身將何為境將何為物將何為隱隱地雲門亦指出此病尚有多文若明得此一種病則下之三種病渙然氷釋矣博山嘗謂學者曰法身中病最多只須大病一場始識得病根假饒盡大地人參禪未有一個不受法身病者惟除盲聾瘖啞者不在此限做工夫疑情發得起與法身理相應見古人道盡大地是沙門一隻眼盡大地是自己一點靈光盡大地在自己一點靈光裏又引教中道一塵中含無邊法界真理便向這裡領略去不肯求進益生不得死不得將此解路謂之悟門通身是病非禪也殊不知縱與理相應若打不脫全是理障墮在法身邊何況被解心牽引不能入理之深這箇獼猴子揑不死既死不去又安得絶後再蘇耶當知最初發疑情便要與理相應既與理相應要得箇深入既得箇深入須向萬仞巖頭翻斤斗打將下來擺手出漳江始是大人用心也不然盡是掠虗漢非當家種草也做工夫疑情發得起與法身理相應行住坐臥如在日色裡如在燈影裏淡淡地沒滋味或更全身放下坐到水澄珠瑩之際風清月白之時正恁麼時依正報中都成一片境去清清淨淨伶伶俐俐自謂之究竟不得轉身吐氣不得入垂手又不肯求人決擇或向淨白界中別生出異念謂之悟門通身是病非禪也天童所謂清光照眼似迷家明白轉身猶墮位良以清光照眼豈非水澄珠瑩風清月白乎明白轉身更進得一步只消似迷墮位四箇字一印印定行人到此又作麼生區處只須有大轉變拈一莖草作丈六金身用未為分外不然是釘樁搖櫓漁父棲巢喚作沒血氣漢打死千個萬個有甚麼罪過做工夫疑情發得起與法身理相應於法身邊生奇特想見光見華見種種異相便作聖解將此殊異之事衒惑於人自謂得大悟門殊不知通身是病非禪也當知此等殊異境像或是自己妄心凝結而成或是魔境乘隙而入或是帝釋天人變化試現妄心凝結者如修淨土人觀想不移念忽見佛像菩薩像等如十六觀經中説悉與淨土理合非參禪要門乘隙而入者如楞嚴經中五蘊空時行人心有所著魔即隨意而現變化試現者如菩薩修行時帝釋化身現無頭鬼無五臟鬼菩薩無怖畏心復現美女身菩薩無愛染心復現帝釋身禮拜云太山可崩海水可竭彼上人者難動其心故云野人伎倆有盡老僧不見不聞無窮若真參學人縱白刃交加於前無暇動念何況靜定中不實境相耶既與理相應則心外無境能觀心所現境又安在甚麼處做工夫疑情發得起與法身理相應覺得身心輕安動轉施為不相留礙此是正偏道交四大調適瞥爾如是非究竟耶彼無知者便放下疑情不肯參究自謂得大悟門殊不知命根不斷縱能入理全是識心以識心卜度通身是病非禪也為入理不深轉身太早雖有深知不得實用縱得活句正好向水邊林下保養含蓄切不可躁進便欲為人妄自尊大當知最初用心疑情發得起結在一團時只待渠自己迸開始得受用不然稍有理致便放下疑情這裡定是死不去定是打不徹一生虗過有參禪之名無參禪之實只饒入垂手不妨更見大善知識彼善知識者是大醫王能療重病是大施主能施如意切不可生自足想不欲見人當知不肯見人為執己見禪中大病無過此者示禪人參公案警語示董巖達空禪者通達虗空翻白浪好把家私都破蕩有眼不見有耳聾赤肉團中加痛棒從教白醭口邊生佛法塵勞一坦平正念針鋒劄不入面皮鐵鑄沒人情非禮莫教輕動步舉止安庠要回互謾將知見妄疏親拶碎疑團須妙悟不破疑團誓不休放出溈山水牯牛一朝驀鼻穿歸也逈地遮天這一頭示峰頂智建禪者參無字公案狗子佛性無當下絶親疏如入千尋浪惟求赤尾魚有角非關鯉無鬚不是渠有無俱勦絶直探驪龍珠又如四面火前方一線餘退步即燒殺橫趨亦喪軀烈𦦨非停止求生莫待徐如入九重淵如憑萬仞虗用意切如此管取發靈樞更有前程路水到自成渠示知白禪者參乾屎橛公案如何是佛乾屎橛大千世界一團鐵渾身坐在鐵團中不得出時向誰説白禮拜復云莫禮拜只饒出得時領取三十棒示智邲禪者參一句話頭在甚處起公案一句話頭甚處起滄海只教乾到底一句話頭甚處去春風觸著珊瑚樹不究去只究起石陷崖崩聾兩耳十二時中步不移如在刃鋒求住止只須斤斗打將來靜陸平原方步武男兒立志若如斯誰道搏龍併捋虎有問臺山路若何遙指前村驀直去示心陽居士參沒蹤迹公案沒蹤迹莫藏身竪起脊梁祇麼行鐵壁銀山俱靠倒幾回歡喜幾回嗔藏身處沒蹤迹休向虗空尋鳥迹放下娘生鐵面皮蒺藜傾出黃金汁返復看不教多管甚衆生與佛魔只教一口都吞盡滴水翻成幾丈波行也參坐也究踢破指頭俱漏逗倒騎鐵馬上須彌一生不著隨人後示照監院看萬法歸一公案萬法歸一一歸何處竪起眉毛如大火聚生與同生死與同死行與同行住與同住頓起疑情莫生怕怖如臨大敵不暇他顧逢逆順境須善回互歸處不知肯隨他務撞破鐵圍山蹲踞寶藏庫瞬目與揚眉全機彰露布青州布衫重七斤門前依舊桃千樹示普周禪者參念佛公案一句阿彌陀如珠投濁水珠投水自清佛念妄即止水自清髭鬚可鑑絶纖塵依稀識得娘生面展似眉毛作麼生妄即止萬里澄潭不見底碧玻璃上珊瑚枝雪老氷枯祇這是祇這是念即空三更初夜日通紅寶池金地蓮花國萬派全歸指顧中指顧中空此念念空空念成一片十萬程途當下知根塵陰界摩尼殿摩尼殿光皎皎佛法塵緣都照了轉位旋機事若何噫生也不道死也不道示觀如禪者看父母未生前公案父母未生前誰是本來面放下鐵心肝提起吹毛劍世法及塵緣如蠓入猛𦦨無量妙法門參禪最靈驗單提句話頭不墮諸方便萬別與千差都來融一念萬仞巖前湛水渟渟一帶晴空間雲片片到此則心月孤圓敢曰靈明顯現光吞萬境境非光却笑澄江淨如練非如練祇一線更須入火重烹煉穴細金針露鼻時蘇州布也揚州絹參示宗妙禪者以千日期參公案善造道者千日功趣向如吞栗棘蓬淨白界中才一念須彌山隔在其中一句話頭如鐵橛佛法塵勞都屏絶昏沉散亂成團去只須切上重加切千日如同頃刻間意路心思絶往還放開兩足超然上烈火層冰總是間全身拶入無生國妙出有無之軌則逼塞虗空不顧人始知大地如漆黑翻身拄杖活如龍透海穿山振古風此是日旋三昧力法界毫端用不窮更有向上末後句玄妙機微都不是不向如來行處行男兒自有沖天志答六雪關主問參公案行人話頭真切不落楞嚴五蘊魔外細觀楞嚴五十種魔事不出一箇看字如色陰明白銷落諸念乃至是人則能超越劫濁觀其所由堅固妄想以為其本即此堅固妄想便不能融化於妄想中精研見希奇之事便作聖解豈非著耶如不作聖解名善境界不作即不著耳又五蘊中總以妄想二字結之最初一著便不能破即此妄想便是魔之根蒂其根本不除挫其枝葉令其不生可乎甚乃利其虗明食彼精氣悉妄想牽合非魔從外來苟涉于慎護正所謂雪上加霜火上益油耳如受陰中虗明妄想虗明亦妄想蓋最初未到求心不有之地非妄而何如想陰中融通妄想最初章云心愛圓明即前妄根與境融通便生愛著十種悉云心愛等蓋天魔從圓境中來與愛心偶合作無邊魔業安可救也良以行人最先坐斷此一念無心即無愛無愛則著之一字何有耶只如第九章云心愛入滅貪求深空等悉是魔業亦最初妄心不破正所謂蒸沙作飯沙非飯本耶如行陰中幽隱妄想蓋行陰乃遷流不止為性故云生滅根元從此披露為想陰盡徹見行陰中根元悉是生滅念念不停行人不隨生滅遷流故得凝明正心爾時天魔不得其便但於圓元中起計度故窮其始末有因無因等既有計度亡正遍知計之一字從幽隱中來文云觀彼幽清不能徹見源底也如識陰中顛倒妄想謂同分生機倏然隳裂六根虗靜無復馳逸虗靜為不馳逸不馳逸為行陰盡耳行陰既盡見聞通鄰互用清淨故云窮諸行空尚依識元乃至精妙未圓便生勝解此十種悉以識心而生勝解既作勝解違遠圓通生諸種類矣禪門中善用心者俱不相涉思大云十方諸佛被我一口吞盡何處更有衆生可度此是佛祖位中留渠不住邪魔外種其奈爾何欲得不受其蝕但全身入理不待遣不待護妄想念盡則魔業自盡矣古德云便好和根下一斧免教節外又生枝答不執修證不廢修證問吾宗門下毋論利鈍賢愚但以信而入既發起猛利心如坐在鐵壁銀山祇求迸出諸妄想心悉不能入觀照功行安將寄乎果得一念迸開如披雲見天如獲故物觀照功行亦何所施祇貴參究之念甚切其參究亦涉于功行但不以功行立名如看破世緣切究至道亦涉于觀照但不以觀照立名如圓覺云惟除頓覺人並法不隨順若以觀照為事則有能觀能照之心必有所觀所照之境能所對立非妄而何所以禪宗云獨蹈大方心外無境將十方世界洎父母身心融成一箇坐斷兩頭始得箇入門向上一路更須自看不然盡是鬼家活計安可以修證同日而語耶果顢頇不到此地即名自欺此輩名為可憐愍者寧堪齒録也南嶽云修證即不無汙染即不得即此不汙染之修可謂圓修還著得箇修字麼即此不汙染之證可謂圓證還著得箇證字麼如此則終日修而無修掃地焚香悉無量之佛事又安可廢但不著修證耳九地尚無功用行況十地乎乃至等覺説法如雨如雲猶被南泉呵斥與道全乖況十地觀照與宗門而較其優劣可乎示參禪偈十首參禪須鐵漢毋論期與限咬定牙齒關只教大事辦猛火熱油鐺虗空都煮爛忽朝撲轉過放下千斤擔參禪莫論久不與塵緣偶剔起兩莖眉虗空顛倒走須彌碾成末當下追本有生鐵金汁流始免從前咎參禪莫莽鹵行誼要稽古一條弦直心不遭岐路苦拶碎黃龍關拈却雲門普這個破落僧從來不出戶參禪沒主宰祇要心不改萬彚及塵勞旋坌誰偢睬堅硬可擎天勇決堪抒海雖然未徹頭管取前程在參禪須審細莫把工程計有條便扳條無條即扳例不親佛與祖管甚經和偈都來一口吞心空始及第參禪發正信信正魔宮震片雪入紅爐赤身遊白刃只尋活路上莫教死水浸大散關忽開倒𩣔毗盧印參禪休把玩倐忽時光換至理及玄奧秦時鍍鑠鑽咄哉丈夫心著手還自判百年能幾何莫待臨行亂參禪無巧拙一念貴超越識得指上影直探天邊月劈開胸見心刮去毛有血分明舉似君不會向誰説參禪須趂早莫待年紀老耳聵眼朧朝在夕難保生平最樂事到此都潦倒佛法本無多祇要今時了參禪莫治妄治妄仍成障譬欲得華鯨管甚波濤漾至體絶纖塵妄心是何狀謹白參禪者斯門真可尚
