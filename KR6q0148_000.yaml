front:
  text: 博山警語序警乃醒覺之義或云驚也譬有賊瞰巨室主人張燈夜坐堂皇之上謦咳作聲賊懼不能便稍爾昏睡則乘間而入橐為之傾故嚴城擊柝刁斗鳴轅卒有變而無虞以其警備於機先也人有生死大患乃萬劫不醒之長夢況亦為賊媒日劫家寶不有大覺之雄痛語警醒則終身醉夢了無悟日非但睡時做不得主即白晝開眼魔語尤甚故博山大師乘悲願力來作大醫王用一味伽陀遍療狂狷業病故有示禪病警語五章直捷簡當把參禪骨髓中病都說透過其開示做工夫語最為喫緊真是禪門一種切要新書亦救世之金丹九轉也夫禪也假名無體何有病乎蓋參禪人多起執情謬解被心意識哄殺不向機境上求便向學解中討或被古人言句礙膺或向死水裏浸殺或坐在無事甲裏不是靈利心死不得便是癡著心轉不得故命根難斷生滅宛然通身都是我病非是禪有病也甚則成枉著魔佛亦不可救此名業病亦非禪病也假饒死得種種心不肯做工夫與法身理相應不曾踏著向上關棙坐在飯籮裡輕安自在只箇輕安正是禪病故僧問古德如何是清淨法身德云無量大病源此語如栗棘蓬吞吐誠難古人從真參實悟中病過一番來其垂手處自不亂下針錐要箇絶氣息識痛癢底漢方肯診視是以識病乃能去病調己然後調人可謂三折肱為良醫歟博山大師自來參究此道極是融通凡有言句皆中肯綮非故為高妙玄著之談使人不知乃平日親證實履境界見到說到行到用到其義理精明辨才無礙所以快說禪病如握秦宮玉鏡照見羣僚肝膽一毫隱諱不得古今踞曲盝牀稱善知識說禪者如師之妙罕儷然禪病最難說說亦不能盡何哉病即法身之病法身無數病寧有極善救法身病者以病為妙劑以病為家常茶飯以病為貼肉汗衫在善葆之而已古人於病假中游戲而為佛事蓋看破法身無主病自霍然故洞山道老僧看時不見有病特由妄想執著故禪病競生昔佛說楞嚴五蘊魔事及外道遍計即是今人禪病中事然著即成魔計則名外不著不計亦未為病所以云不作聖心名善境界若作聖解即受羣邪法華云有一導師善知通塞險難道路故能導彼衆人前至寶所然則大師此書正末世舟杭初心徑路豈但有益於今日亦有補於將來決欲參禪做工夫求大悟門肯細觀此書大有相為作略能使疑情發不起處發起病根點不破處點破如披沙露寶要渠自取如開霧見天使人不迷截路中有出身之路死句裏有活人之句如圓珠走盤不滯一語其妙用如此人人知此用心可以坐睡見道不費許多草鞋錢直到大安樂田地與佛祖同一鼻孔通風有能以此自警者而警衆復以此自愈者而愈人亦名現在醫王使祖師命脉流通國脉與慧脉並固庶不負大師垂示之方便願力云爾是為序萬曆辛亥歲孟秋月信州弟子劉崇慶和南題博山和尚參禪警語目次卷上示初心做工夫警語評古德垂示警語卷下評古德垂示警語示疑情發不起警語示疑情發得起警語示禪人參公案警語示參禪偈十首
